<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Install font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
</head>
  
<body class="layout-home">
  <!-- Kontainer Induk -->
  <div class="site-wrapper">
    <!-- Navigation -->
    {% include navigation.html %}

    <!-- Main Content -->
    <main class="home-tabloid">
      <!-- Masthead (Judul site) -->
      <header class="masthead">
        <h1 class="site-name">{{ site.title }}</h1>
        <p class="site-desc">{{ site.description }}</p>
      </header>
      <!-- Konten dari index.md -->
      {{ content }}
      
    </main>

    <!-- Footer -->
    {% include footer.html %}
    
  </div>

  <!-- Scroll Navigation Script -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const projectsGrid = document.getElementById('projectsGrid');
    const scrollPrev = document.querySelector('.scroll-prev');
    const scrollNext = document.querySelector('.scroll-next');
    
    if (projectsGrid && scrollPrev && scrollNext) {
      const scrollAmount = 400;
      
      // Scroll Prev
      scrollPrev.addEventListener('click', function(e) {
        e.preventDefault();
        projectsGrid.scrollBy({ 
          left: -scrollAmount, 
          behavior: 'smooth' 
        });
      });
      
      // Scroll Next
      scrollNext.addEventListener('click', function(e) {
        e.preventDefault();
        projectsGrid.scrollBy({ 
          left: scrollAmount, 
          behavior: 'smooth' 
        });
      });
      
      // Update button state on scroll
      projectsGrid.addEventListener('scroll', function() {
        const maxScroll = projectsGrid.scrollWidth - projectsGrid.clientWidth;
        
        // Prev button
        if (projectsGrid.scrollLeft <= 10) {
          scrollPrev.style.opacity = '0.3';
          scrollPrev.style.pointerEvents = 'none';
        } else {
          scrollPrev.style.opacity = '1';
          scrollPrev.style.pointerEvents = 'auto';
        }
        
        // Next button
        if (projectsGrid.scrollLeft >= maxScroll - 10) {
          scrollNext.style.opacity = '0.3';
          scrollNext.style.pointerEvents = 'none';
        } else {
          scrollNext.style.opacity = '1';
          scrollNext.style.pointerEvents = 'auto';
        }
      });
      
      // Initial state check
      setTimeout(function() {
        projectsGrid.dispatchEvent(new Event('scroll'));
      }, 100);
    } else {
      console.log('Scroll elements not found:', {
        grid: !!projectsGrid,
        prev: !!scrollPrev,
        next: !!scrollNext
      });
    }
  });
  </script>
  
</body>
</html>
