<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Install font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
</head>

<script>
  // Horizontal Scroll Navigation
  const projectsGrid = document.getElementById('projectsGrid');
  const scrollPrev = document.querySelector('.scroll-prev');
  const scrollNext = document.querySelector('.scroll-next');
  
  if (projectsGrid && scrollPrev && scrollNext) {
    const scrollAmount = 400;
    
    scrollPrev.addEventListener('click', () => {
      projectsGrid.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
    });
    
    scrollNext.addEventListener('click', () => {
      projectsGrid.scrollBy({ left: scrollAmount, behavior: 'smooth' });
    });
    
    // Update button state on scroll
    projectsGrid.addEventListener('scroll', () => {
      const maxScroll = projectsGrid.scrollWidth - projectsGrid.clientWidth;
      
      if (projectsGrid.scrollLeft <= 0) {
        scrollPrev.classList.add('disabled');
        scrollPrev.setAttribute('disabled', 'true');
      } else {
        scrollPrev.classList.remove('disabled');
        scrollPrev.removeAttribute('disabled');
      }
      
      if (projectsGrid.scrollLeft >= maxScroll - 1) {
        scrollNext.classList.add('disabled');
        scrollNext.setAttribute('disabled', 'true');
      } else {
        scrollNext.classList.remove('disabled');
        scrollNext.removeAttribute('disabled');
      }
    });
    
    // Initial state check
    projectsGrid.dispatchEvent(new Event('scroll'));
  }
</script>
  
<body class="layout-home">
  <!-- Kontainer Induk -->
  <div class="site-wrapper">
    <!-- Navigation -->
    {% include navigation.html %}

    <!-- Main Content -->
    <main class="home-tabloid">
      <!-- Masthead (Judul site) -->
      <header class="masthead">
        <h1 class="site-name">{{ site.title }}</h1>
        <p class="site-desc">{{ site.description }}</p>
      </header>
      <!-- Konten dari index.md -->
      {{ content }}
      
    </main>

    <!-- Footer -->
    {% include footer.html %}
    
  </div>
  
</body>
</html>
