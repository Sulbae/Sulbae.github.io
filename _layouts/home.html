<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Install font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
</head>
  
<body class="layout-home">
  <!-- Kontainer Induk -->
  <div class="site-wrapper">
    <!-- Navigation -->
    {% include navigation.html %}

    <!-- Main Content -->
    <main class="home-tabloid">
      <!-- Masthead (Judul site) -->
      <header class="masthead">
        <h1 class="site-name">{{ site.title }}</h1>
        <p class="site-desc">{{ site.description }}</p>
      </header>
      <!-- Konten dari index.md -->
      {{ content }}
      
    </main>

    <!-- Footer -->
    {% include footer.html %}
    
  </div>

  <!-- Scroll Navigation Script -->
  <script>
  document.addEventListener('DOMContentLoaded', function() {
    const projectsGrid = document.getElementById('projectsGrid');
    const scrollPrev = document.querySelector('.scroll-prev');
    const scrollNext = document.querySelector('.scroll-next');
    const scrollDotsContainer = document.getElementById('scrollDots');
    
    if (projectsGrid && scrollPrev && scrollNext && scrollDotsContainer) {
      const cards = projectsGrid.querySelectorAll('.project-card');
      const scrollAmount = 400;
      let scrollTimeout;

      // Generate dots
      cards.forEach((card, index) => {
        const dot = document.createElement('button');
        dot.className = 'scroll-dot';
        dot.setAttribute('aria-label', `Go to project ${index + 1}`);
        dot.addEventListener('click', function() {
          closeAllDetails();
          const cardOffset = card.offsetLeft;
          projectsGrid.scrollTo({
            left: cardOffset,
            behavior: 'smooth'
          });
        });
        scrollDotsContainer.appendChild(dot);
      });

      const dots = scrollDotsContainer.querySelectorAll('.scroll-dot');
      
      // Scroll Prev
      scrollPrev.addEventListener('click', function(e) {
        e.preventDefault();
        closeAllDetails();
        projectsGrid.scrollBy({ 
          left: -scrollAmount, 
          behavior: 'smooth' 
        });
      });
      
      // Scroll Next
      scrollNext.addEventListener('click', function(e) {
        e.preventDefault();
        closeAllDetails();
        projectsGrid.scrollBy({ 
          left: scrollAmount, 
          behavior: 'smooth' 
        });
      });

      // Update dots & auto-close saat scroll (keyboard/touch)
      projectsGrid.addEventListener('scroll', function() {
        closeAllDetails();
        updateDots();
        updateButtonState();
      });

      // Fungsi update active dots
      function updateDots() {
        const gridScrollLeft = projectsGrid.scrollLeft;
        const gridWidth = projectsGrid.offsetWidth;
        
        cards.forEach((card, index) => {
          const cardLeft = card.offsetLeft;
          const cardWidth = card.offsetWidth;
          const cardCenter = cardLeft + (cardWidth / 2);
          
          // Check if card is in view (center of viewport)
          const isVisible = Math.abs(gridScrollLeft + (gridWidth / 2) - cardCenter) < (cardWidth / 2);
          
          if (isVisible) {
            dots.forEach(d => d.classList.remove('active'));
            dots[index].classList.add('active');
          }
        });
      }

      // Fungsi tutup semua details
      function closeAllDetails() {
        const allDetails = projectsGrid.querySelectorAll('details[open]');
        allDetails.forEach(function(detail) {
          detail.removeAttribute('open');
        });
      }
      
      // Update button state on scroll
      projectsGrid.addEventListener('scroll', function() {
        const maxScroll = projectsGrid.scrollWidth - projectsGrid.clientWidth;
        
        // Prev button
        if (projectsGrid.scrollLeft <= 10) {
          scrollPrev.style.opacity = '0.3';
          scrollPrev.style.pointerEvents = 'none';
        } else {
          scrollPrev.style.opacity = '1';
          scrollPrev.style.pointerEvents = 'auto';
        }
        
        // Next button
        if (projectsGrid.scrollLeft >= maxScroll - 10) {
          scrollNext.style.opacity = '0.3';
          scrollNext.style.pointerEvents = 'none';
        } else {
          scrollNext.style.opacity = '1';
          scrollNext.style.pointerEvents = 'auto';
        }
      });
      
      // Initial state check
      setTimeout(function() {
        updateDots();
        updateButtonState();
      }, 100);
    }
  });
  </script>
  
</body>
</html>
