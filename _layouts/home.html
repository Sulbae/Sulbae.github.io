<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>

  <!-- Install font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="{{ '/assets/css/home.css' | relative_url }}">
</head>
<body class="layout-home">
  <!-- Kontainer Induk -->
  <div class="site-wrapper">
    <!-- Navigation -->
    {% include navigation.html %}

    <!-- Main Content -->
    <main class="home-tabloid">
      <!-- Masthead (Judul site) -->
      <header class="masthead">
        <h1 class="site-name">{{ site.title }}</h1>
        <p class="site-desc">{{ site.description }}</p>
      </header>
      <!-- Konten dari index.md -->
      {{ content }}
      
    </main>

    <!-- Footer -->
    {% include footer.html %}
    
  </div>
  
</body>
</html>
